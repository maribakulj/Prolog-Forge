# cargo-deny config — https://embarkstudios.github.io/cargo-deny/
#
# Three checks gate every PR:
#   1. `licenses`    — every transitive dep must carry a permissive
#                      license. The Apache-2.0 / MIT / BSD-* / ISC /
#                      Unicode-3.0 / Zlib set covers the entire crate
#                      ecosystem AYE-AYE pulls in today; copyleft
#                      licenses (GPL/AGPL/LGPL) are explicitly refused
#                      so the workspace stays Apache-2.0 distributable.
#   2. `bans`        — no two versions of the same crate in the
#                      lockfile (catches accidental ecosystem splits
#                      like syn 1 + syn 2 living together). Skip-list
#                      lives below for crates where a duplicate is
#                      genuinely unavoidable.
#   3. `advisories`  — duplicate of `cargo audit`, kept here so the
#                      `cargo deny check all` one-shot covers
#                      everything. Severity matches CI's audit job.

[graph]
all-features = true

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Crates that may exist in two versions because their major-version
# bump is still propagating through the ecosystem. Revisit each
# entry on a clippy-version bump and remove what's no longer needed.
skip = []
skip-tree = []

[advisories]
yanked = "warn"
ignore = []
