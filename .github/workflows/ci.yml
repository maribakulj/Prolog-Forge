name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-and-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # `rustup show` auto-installs the channel pinned in
        # `rust-toolchain.toml`, so CI runs the exact same toolchain
        # local devs do. Bump the version in `rust-toolchain.toml`
        # to upgrade clippy/rustc — never hard-code a different
        # version here. This kills the "passes locally, fails on CI"
        # clippy-lint drift class of bug.
        run: |
          rustup show active-toolchain || rustup show
          rustup component add rustfmt clippy

      # Smarter than the hand-rolled `actions/cache` — keys on Cargo.lock,
      # splits registry / git / target into separate caches, and prunes
      # stale build artefacts on hit. Cuts cold-CI build time from
      # ~3 min to ~45 s on this workspace.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: aye-aye-${{ hashFiles('rust-toolchain.toml') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      - name: Validate JSON schema
        run: |
          python3 -c "import json,sys; json.load(open('schemas/protocol.json'))"

      - name: Daemon smoke test
        shell: bash
        run: |
          set -euo pipefail
          python3 tooling/smoke/daemon_smoke.py

  audit:
    name: cargo audit (CVE scan)
    runs-on: ubuntu-latest
    # Don't gate the merge on a freshly-published advisory — the audit
    # job runs on every push but its failure is informational. Promote
    # to required once the advisory baseline is clean for a few weeks.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup show active-toolchain || rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: aye-aye-audit
      - name: Install cargo-audit
        # Pin the binary version so a fresh release of cargo-audit
        # can't change CI behaviour overnight. Bump in the same PR
        # as the rust-toolchain bump.
        run: cargo install --locked --version 0.21.2 cargo-audit
      - name: Run cargo audit
        # `--deny warnings` would also fail on yanked crates and
        # unmaintained advisories; we only want hard CVEs to fail
        # the job, hence no flag here.
        run: cargo audit

  deny:
    name: cargo deny (licenses + dups + advisories)
    runs-on: ubuntu-latest
    # `bans.multiple-versions = "warn"` in deny.toml is intentional —
    # we surface dup-version drift on every PR but don't gate the
    # merge until the workspace is dup-free. Tighten to `deny` once
    # the list is clean.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check all
          arguments: --workspace

  msrv:
    name: MSRV check (rust 1.75)
    runs-on: ubuntu-latest
    # Cargo.toml advertises `rust-version = "1.75"`. This job *proves*
    # the workspace actually builds on that toolchain — without it,
    # the MSRV claim drifts the moment any contributor uses a feature
    # introduced in a later release. Bump in Cargo.toml *and* here in
    # lockstep, with a CHANGELOG note about consumers needing to
    # upgrade.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      # Override the workspace's pinned channel (1.95.0) with the
      # MSRV. We ignore `rust-toolchain.toml` for this job only by
      # passing `--toolchain` explicitly to cargo.
      - name: Install MSRV toolchain
        run: |
          rustup toolchain install 1.75.0 --profile minimal
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: aye-aye-msrv-1.75.0
      - name: Build on MSRV
        run: cargo +1.75.0 build --workspace --all-targets

  vscode-adapter:
    name: VS Code adapter (syntax check)
    runs-on: ubuntu-latest
    # The adapter is intentionally pure-JS with no `npm install` step
    # (see adapters/vscode/README.md). `node --check` parses each
    # file and reports any syntax error — enough to catch typos and
    # broken refactors without standing up a full lint toolchain.
    # Validate package.json shape too.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate package.json
        run: |
          node -e "JSON.parse(require('fs').readFileSync('adapters/vscode/package.json','utf8'))"
      - name: Syntax-check every adapter source file
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          status=0
          for f in adapters/vscode/src/*.js; do
            echo "checking $f"
            node --check "$f" || status=1
          done
          exit $status
