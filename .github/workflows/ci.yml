name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-and-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # `rustup show` auto-installs the channel pinned in
        # `rust-toolchain.toml`, so CI runs the exact same toolchain
        # local devs do. Bump the version in `rust-toolchain.toml`
        # to upgrade clippy/rustc — never hard-code a different
        # version here. This kills the "passes locally, fails on CI"
        # clippy-lint drift class of bug.
        run: |
          rustup show active-toolchain || rustup show
          rustup component add rustfmt clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      - name: Validate JSON schema
        run: |
          python3 -c "import json,sys; json.load(open('schemas/protocol.json'))"

      - name: Daemon smoke test
        shell: bash
        run: |
          set -euo pipefail
          python3 tooling/smoke/daemon_smoke.py
